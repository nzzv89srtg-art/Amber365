<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amber365 ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-hearts"></div>

<!-- INTRO -->

<section id="intro" class="screen active">

    <div class="intro-card">

        <div class="heart">❤️</div>

        <h1>Amber365</h1>

        <p class="tagline">
            365 songs.<br>
            365 reminders of you.
        </p>

        <button id="openButton">
            Open my heart
        </button>

    </div>

</section>

<!-- APP -->

<section id="app" class="screen">

<header>

<div class="progress-text">

<span id="dayNumber">
Day 1 of 365
</span>

<span id="progress">
1 / 365
</span>

</div>

<div class="progress-bar">

<div id="progressFill"></div>

</div>

</header>

<main>

<div class="song-card" id="songCard">

<h2 id="songTitle">
Sun to Me
</h2>

<h3 id="artist">
Zach Bryan
</h3>

<blockquote id="lyric">
"You're the sun to me."
</blockquote>

</div>

</main>

<footer>

<button id="previous">←</button>

<button id="next">→</button>

</footer>

<div class="signature">
Made with ❤️ for Amber
</div>

</section>

<script src="songs.js"></script>
<script src="script.js"></script>

</body>

</html>
